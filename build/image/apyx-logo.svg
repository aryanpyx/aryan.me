<svg fill="none" viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple → Blue → Cyan gradient (matches the reference image) -->
    <linearGradient id="ag" x1="15" y1="5" x2="110" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c040ff"/>
      <stop offset="45%"  stop-color="#4455ff"/>
      <stop offset="100%" stop-color="#00d8ff"/>
    </linearGradient>

    <!-- Shimmer sweep overlay -->
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer glow removed: used CSS drop-shadow in .pulse instead to avoid bounding-box artifact -->
    <!-- Spark glow -->
    <filter id="sg2" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Gentle float + sway */
    @keyframes float {
      0%,100% { transform: translateY(0)   rotate(0deg);   }
      30%      { transform: translateY(-5px) rotate(0.5deg); }
      70%      { transform: translateY(-3px) rotate(-0.4deg); }
    }
    /* Glow pulse */
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 3px #8855ffaa) drop-shadow(0 0 6px #4455ff44); }
      50%      { filter: drop-shadow(0 0 8px #c040ffcc) drop-shadow(0 0 18px #00d8ff88); }
    }
    /* Shimmer sweep */
    @keyframes sweep {
      0%,100% { opacity: 0; }
      35%,65%  { opacity: 1; }
    }
    /* Spark particles */
    @keyframes sp1 {
      0%   { transform:translate(0,0)   scale(1);   opacity:1; }
      100% { transform:translate(7px,-16px) scale(0); opacity:0; }
    }
    @keyframes sp2 {
      0%   { transform:translate(0,0)   scale(1);   opacity:.85; }
      100% { transform:translate(-5px,-14px) scale(0); opacity:0; }
    }
    @keyframes sp3 {
      0%   { transform:translate(0,0)  scale(.9);  opacity:.7; }
      100% { transform:translate(10px,-12px) scale(0); opacity:0; }
    }
    @keyframes sp4 {
      0%   { transform:translate(0,0)  scale(.7);  opacity:.6; }
      100% { transform:translate(-8px,-18px) scale(0); opacity:0; }
    }

    .logo      { animation: float 3s ease-in-out infinite, pulse 2.5s ease-in-out infinite; transform-origin: 60px 60px; }
    .shimmer   { animation: sweep 3s ease-in-out infinite; }
    .sp1 { animation: sp1 2s ease-out infinite 0s;    }
    .sp2 { animation: sp2 2s ease-out infinite 0.5s;  }
    .sp3 { animation: sp3 2s ease-out infinite 1s;    }
    .sp4 { animation: sp4 2s ease-out infinite 1.5s;  }
  </style>

  <!-- Sparks floating off the top peak of A -->
  <g filter="url(#sg2)">
    <circle class="sp1" cx="60" cy="14" r="2"   fill="#c040ff"/>
    <circle class="sp2" cx="55" cy="11" r="1.6" fill="#00d8ff"/>
    <circle class="sp3" cx="65" cy="9"  r="1.3" fill="#7766ff"/>
    <circle class="sp4" cx="59" cy="6"  r="1"   fill="#ffffff"/>
  </g>

  <!--
    AX monogram — proportions calibrated to match the reference image:
    • A: tall, wide-legged, peak at top-center, open crossbar (left-side only, doesn't cross right leg)
    • X: offset to lower-right quadrant, shares/overlaps with A's right leg
    All strokes: width 10, round caps & joins
  -->
  <g class="logo">

    <!-- A - left leg: from bottom-left up to peak -->
    <line x1="12" y1="105" x2="60" y2="10" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"/>

    <!-- A - right leg: from peak down to mid-right (not all the way — X takes over) -->
    <line x1="60" y1="10" x2="78" y2="70" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"/>

    <!-- A - crossbar on the left only (gap before right leg — open modern look) -->
    <line x1="25" y1="68" x2="55" y2="68" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"/>

    <!-- X - slash top-left → bottom-right (starts where A's right leg leaves off) -->
    <line x1="64" y1="58" x2="105" y2="107" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"/>

    <!-- X - slash top-right → bottom-left (crosses the above) -->
    <line x1="103" y1="58" x2="64" y2="107" stroke="url(#ag)" stroke-width="10" stroke-linecap="round"/>

    <!-- Shimmer sweep (same paths, white overlay) -->
    <g class="shimmer" opacity="0">
      <line x1="12"  y1="105" x2="60"  y2="10"  stroke="url(#sg)" stroke-width="10" stroke-linecap="round"/>
      <line x1="60"  y1="10"  x2="78"  y2="70"  stroke="url(#sg)" stroke-width="10" stroke-linecap="round"/>
      <line x1="25"  y1="68"  x2="55"  y2="68"  stroke="url(#sg)" stroke-width="10" stroke-linecap="round"/>
      <line x1="64"  y1="58"  x2="105" y2="107" stroke="url(#sg)" stroke-width="10" stroke-linecap="round"/>
      <line x1="103" y1="58"  x2="64"  y2="107" stroke="url(#sg)" stroke-width="10" stroke-linecap="round"/>
    </g>

  </g>
</svg>
